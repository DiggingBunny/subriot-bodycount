name: Update Kill Counter Data

on:
  push:
    paths:
      - 'chat.txt' # chat.txt 파일이 업데이트될 때만 실행됩니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run parser
        # 파이썬 스크립트를 실행하여 chatdata.js를 생성합니다.
        run: python parse_kakao.py chat.txt

      - name: Commit and Push changes
        # 생성된 chatdata.js를 다시 저장소에 업데이트합니다.
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add chatdata.js
          git commit -m "🤖 데이터 자동 업데이트 ($(date +'%Y-%m-%d %H:%M'))" || echo "변경 사항 없음"
          git push
